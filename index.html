<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estadio Pop – Placa de Noticias Deportivas Federales</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0e1116; --bg-surface: #161a23; --bg-navbar: #090b0e;
      --interactive-primary: #ff4d4d; --text-main: #e6e8ea; --text-muted: #9aa5b1;
      --font-display: 'Lora', serif; --font-body: 'Inter', sans-serif;
    }
    body { font-family: var(--font-body); color: var(--text-main); background: var(--bg-main); }
    .navbar { background-color: var(--bg-navbar) !important; border-bottom: 1px solid rgba(255, 255, 255, 0.04); padding: 18px 0; }
    .navbar-brand { font-family: var(--font-display); font-weight: 700; font-size: 1.6rem; }
    .sports-navigator { position: sticky; top: 0; z-index: 1020; background: rgba(14, 17, 22, 0.9); backdrop-filter: blur(12px); padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .nav-ux-tabs { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
    .ux-tab-btn { background: rgba(255, 255, 255, 0.02); color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.06); padding: 8px 20px; border-radius: 4px; font-size: 0.9rem; text-decoration: none; transition: 0.2s; white-space: nowrap; }
    .ux-tab-btn.active { background: var(--interactive-primary); color: #fff; }
    .section-title { font-family: var(--font-display); margin: 40px 0 20px; border-bottom: 2px solid rgba(255, 255, 255, 0.05); padding-bottom: 10px; }
    .card-ux { background: var(--bg-surface); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 12px; overflow: hidden; height: 100%; transition: 0.3s; }
    .card-ux-wrapper { cursor: pointer; display: block; text-decoration: none; color: inherit; }
    .card-ux-wrapper:hover .card-ux { transform: translateY(-5px); border-color: var(--interactive-primary); }
    .card-img-top { height: 200px; object-fit: cover; }
    .modal-content-ux { background-color: var(--bg-surface); color: var(--text-main); }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark"><div class="container"><a class="navbar-brand" href="#">ESTADIO POP</a></div></nav>

  <div class="sports-navigator">
    <div class="container">
      <nav class="nav-ux-tabs">
        <a href="#lpf" class="ux-tab-btn active">Liga Profesional</a>
        <a href="#ascenso-federal" class="ux-tab-btn">Ascenso Federal</a>
        <a href="#seleccion" class="ux-tab-btn">Selección</a>
        <a href="#lnb" class="ux-tab-btn">Liga Nacional</a>
        <a href="#auto" class="ux-tab-btn">Automovilismo</a>
      </nav>
    </div>
  </div>

  <main class="container py-4">
    <section id="lpf"><h2 class="section-title">Liga Profesional</h2><div class="row g-4 grilla-noticias" data-seccion="lpf"></div></section>
    <section id="ascenso-federal"><h2 class="section-title">Ascenso Federal</h2><div class="row g-4 grilla-noticias" data-seccion="ascenso-federal"></div></section>
    <section id="seleccion"><h2 class="section-title">Selección Argentina</h2><div class="row g-4 grilla-noticias" data-seccion="seleccion"></div></section>
    <section id="lnb"><h2 class="section-title">Liga Nacional</h2><div class="row g-4 grilla-noticias" data-seccion="lnb"></div></section>
    <section id="auto"><h2 class="section-title">Automovilismo</h2><div class="row g-4 grilla-noticias" data-seccion="auto"></div></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('noticias.json?nocache=' + Date.now())
      .then(res => res.json())
      .then(noticias => {
        noticias.forEach((noticia, index) => {
          const grilla = document.querySelector(`.grilla-noticias[data-seccion="${noticia.seccion}"]`);
          if (!grilla) return;
          
          const modalId = `modal${index}`;
          const wrapper = document.createElement('div');
          wrapper.className = 'col-12 col-md-4 card-ux-wrapper';
          wrapper.setAttribute('data-bs-toggle', 'modal');
          wrapper.setAttribute('data-bs-target', `#${modalId}`);
          wrapper.innerHTML = `
            <div class="card-ux">
              <img src="${noticia.imagen}" class="card-img-top">
              <div class="p-3"><h5>${noticia.titulo}</h5><p class="text-muted small">${noticia.descripcion || ''}</p></div>
            </div>`;
          
          const modalMarkup = `
            <div class="modal fade" id="${modalId}" tabindex="-1">
              <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content modal-content-ux">
                  <div class="modal-header border-0"><h4 class="modal-title">${noticia.titulo}</h4></div>
                  <div class="modal-body"><img src="${noticia.imagen}" class="w-100 mb-3"><p>${noticia.contenido || ''}</p></div>
                </div>
              </div>
            </div>`;
          
          grilla.appendChild(wrapper);
          document.body.insertAdjacentHTML('beforeend', modalMarkup);
        });
      });
  </script>
</body>
</html>
